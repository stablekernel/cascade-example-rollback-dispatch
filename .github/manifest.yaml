    schema_version: 1
    trunk_branch: main
    triggers:
      - src/**
    environments:
      - prod
    cli_version: v0.6.0-dryrun.2
    state_token: ${{ secrets.CASCADE_STATE_TOKEN }}
    manifest_file: .github/manifest.yaml
    manifest_key: ci
    builds:
